      - Agent 工具生态
      - 网页抓取与信息入口
      - AI 编程与工具调用稳定性
    watch_reason: 每日趋势入口，适合发现新的工具、库和可接入工作流的项目。
    note: 每日 Python 趋势仓库入口，用来发现可接入工作流的新工具。

  - name: GitHub Trending
    type: page
