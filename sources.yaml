# 每日内容来源配置
# type 支持：rss / github / page
# 目标：把 Agent-Reach 的调研入口、AI News Radar 的筛选、Scrapling 的页面抽取整合成信息收集站。

site:
  title: Daily News Radar
  description: 调研入口聚合 + AI 新闻雷达 + 网页内容抽取
  timezone: Asia/Shanghai

ranking:
  keywords:
    - AI
    - agent
    - LLM
    - model
    - OpenAI
    - Anthropic
    - Google
    - GitHub
    - crawler
    - scraping
    - research
    - RAG
    - radar
    - discovery
    - fetcher
    - workflow

sources:
  - name: Agent-Reach
    type: github
    url: https://github.com/Panniantong/Agent-Reach
    repo: Panniantong/Agent-Reach
    category: research-entry
    limit: 1
    observe: true
    priority: P0
    cadence: daily
    watch_reason: Agent 上网与调研入口聚合，决定信息系统能接触哪些网页、社区、仓库和趋势入口。
    note: Agent 上网与调研入口聚合，把网页、视频、社区、仓库交给 Agent 查。

  - name: AI News Radar
    type: github
    url: https://github.com/AIkdb/ai-news-radar
    repo: AIkdb/ai-news-radar
    category: ai-radar
    limit: 1
    observe: true
    priority: P0
    cadence: daily
    watch_reason: 长期观察信源筛选、去重、打分、AI 强相关过滤和静态信息站 pipeline。
    note: 24 小时 AI 更新雷达，按信息源筛选、去重、分类并生成可读视图。

  - name: Scrapling
    type: github
    url: https://github.com/D4Vinci/Scrapling
    repo: D4Vinci/Scrapling
    category: crawler
    limit: 1
    observe: true
    priority: P0
    cadence: daily
    watch_reason: 长期观察现代网页抓取、自适应选择器、动态页面、Spider 和反爬 fallback 能力。
    note: 面向现代网页的内容抽取与抓取能力，补足 RSS 覆盖不到的页面。

  - name: Hacker News
    type: rss
    url: https://news.ycombinator.com/rss
    category: tech
    limit: 8

  - name: GitHub Blog
    type: rss
    url: https://github.blog/feed/
    category: dev
    limit: 5

  - name: OpenAI Blog
    type: rss
    url: https://openai.com/news/rss.xml
    category: ai
    limit: 5

  - name: Anthropic News
    type: rss
    url: https://www.anthropic.com/news/rss.xml
    category: ai
    limit: 5

  - name: Google DeepMind Blog
    type: rss
    url: https://deepmind.google/discover/blog/rss.xml
    category: ai
    limit: 5

  - name: The Batch
    type: rss
    url: https://www.deeplearning.ai/the-batch/feed/
    category: ai
    limit: 5

  - name: Product Hunt Daily
    type: rss
    url: https://www.producthunt.com/feed
    category: product
    limit: 8

  - name: Simon Willison
    type: rss
    url: https://simonwillison.net/atom/everything/
    category: ai-dev
    limit: 5

  - name: Daily JS
    type: rss
    url: https://dailyjs.com/rss.xml
    category: dev
    limit: 5

  - name: GitHub Trending Python
    type: page
    url: https://github.com/trending/python?since=daily
    category: github-trending
    limit: 1
    observe: true
    priority: P1
    cadence: daily
    watch_reason: 每日趋势入口，适合发现新的工具、库和可接入工作流的项目。
    note: 每日 Python 趋势仓库入口，用来发现可接入工作流的新工具。

  - name: GitHub Trending
    type: page
    url: https://github.com/trending?since=daily
    category: github-trending
    limit: 1
    observe: true
    priority: P1
    cadence: daily
    watch_reason: 每日 GitHub 趋势入口，先判断能否接入工作流，再看星标热度。
    note: 每日 GitHub 趋势入口，先看能不能接入工作流，再看星标热度。
