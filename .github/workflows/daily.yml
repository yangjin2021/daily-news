name: Daily News Collector

on:
  workflow_dispatch:
  schedule:
    # 23:30 UTC = 07:30 Beijing time
    - cron: "30 23 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect daily content
        run: python scripts/collect.py

      - name: Commit daily output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add daily news output"
          file_pattern: outputs/*.md
