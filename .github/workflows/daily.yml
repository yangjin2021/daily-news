name: Daily News Radar

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "sources.yaml"
      - "scripts/**"
      - "site/**"
      - "AGENTS.md"
      - ".github/workflows/daily.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-news-radar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect daily news
        run: python scripts/collect.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit generated outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily news radar"
          file_pattern: "outputs/*.md site/data/news.json site/data/source_health.json reports/source-health.md"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
