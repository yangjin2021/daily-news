name: Generate Topic Report

on:
  workflow_dispatch:
    inputs:
      query:
        description: "报告主题，例如 AI Agent / 网页抓取 / GitHub 热门项目"
        required: true
        default: "AI Agent"
      max_items:
        description: "最多输出多少条"
        required: true
        default: "12"
      depth:
        description: "brief / standard / deep"
        required: true
        default: "standard"

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Refresh cache with Agent-Reach adapter
        run: python scripts/collect_with_agent_reach.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE_AGENT_REACH: ${{ vars.ENABLE_AGENT_REACH }}
          AGENT_REACH_COMMAND_TEMPLATE: ${{ vars.AGENT_REACH_COMMAND_TEMPLATE }}
      - name: Generate report
        run: |
          python scripts/report.py \
            --query "${{ inputs.query }}" \
            --from-cache \
            --max-items "${{ inputs.max_items }}" \
            --depth "${{ inputs.depth }}" \
            --print
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add outputs/*.md reports/*.md reports/*.json site/data/*.json
          if git diff --cached --quiet; then
            echo "No report changes to commit"
            exit 0
          fi
          git commit -m "Generate topic report"
          git push origin main
