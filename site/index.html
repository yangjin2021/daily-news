<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily News Radar</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #d8e0ea;
      --blue: #2563eb;
      --green: #047857;
      --amber: #b45309;
      --red: #be123c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .wrap {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: 0;
    }
    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 760px;
    }
    .updated {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 12px;
      margin-top: 18px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 11px 12px;
      font-size: 15px;
    }
    main .wrap {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
    }
    aside {
      position: sticky;
      top: 14px;
      align-self: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    .stat:last-child { border-bottom: 0; }
    .feed {
      display: grid;
      gap: 12px;
    }
    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 19px;
      line-height: 1.35;
      letter-spacing: 0;
    }
    a {
      color: var(--blue);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .summary {
      margin: 0 0 12px;
      color: #334155;
    }
    .text {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--muted);
      background: #fbfdff;
      font-size: 12px;
    }
    .score { color: var(--green); }
    .github { color: var(--amber); }
    .page { color: var(--red); }
    .empty {
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 780px) {
      .top {
        align-items: flex-start;
        flex-direction: column;
      }
      .updated { white-space: normal; }
      .controls { grid-template-columns: 1fr; }
      main .wrap { grid-template-columns: 1fr; }
      aside { position: static; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="top">
        <div>
          <h1>Daily News Radar</h1>
          <p class="sub">信息收集站：用 Agent-Reach 的入口意识找渠道，用 AI News Radar 的方式筛信号，用 Scrapling 思路抽网页内容。</p>
        </div>
        <div class="updated" id="updated">等待数据</div>
      </div>
      <div class="controls">
        <input id="search" type="search" placeholder="搜索标题、摘要、来源、分类">
        <select id="category">
          <option value="">全部分类</option>
        </select>
      </div>
    </div>
  </header>
  <main>
    <div class="wrap">
      <aside>
        <strong>今日概览</strong>
        <div id="stats"></div>
      </aside>
      <section class="feed" id="feed"></section>
    </div>
  </main>
  <script>
    const state = { items: [], query: "", category: "" };
    const feed = document.querySelector("#feed");
    const stats = document.querySelector("#stats");
    const updated = document.querySelector("#updated");
    const search = document.querySelector("#search");
    const category = document.querySelector("#category");

    function esc(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function trim(value, length) {
      const text = String(value || "").trim();
      return text.length > length ? `${text.slice(0, length).trim()}...` : text;
    }

    function renderStats(payload) {
      const categories = Object.entries(payload.categories || {});
      stats.innerHTML = [
        `<div class="stat"><span>总条目</span><strong>${payload.total || 0}</strong></div>`,
        ...categories.slice(0, 12).map(([name, count]) => `<div class="stat"><span>${esc(name)}</span><strong>${count}</strong></div>`)
      ].join("");
    }

    function renderCategories(items) {
      const names = [...new Set(items.map((item) => item.category).filter(Boolean))].sort();
      category.innerHTML = `<option value="">全部分类</option>` + names.map((name) => `<option value="${esc(name)}">${esc(name)}</option>`).join("");
    }

    function renderFeed() {
      const query = state.query.trim().toLowerCase();
      const visible = state.items.filter((item) => {
        const categoryMatched = !state.category || item.category === state.category;
        const haystack = `${item.title} ${item.summary} ${item.text} ${item.source} ${item.category}`.toLowerCase();
        return categoryMatched && (!query || haystack.includes(query));
      });

      if (!visible.length) {
        feed.innerHTML = `<div class="empty">没有匹配的信息。</div>`;
        return;
      }

      feed.innerHTML = visible.map((item) => `
        <article>
          <h2><a href="${esc(item.url)}" target="_blank" rel="noreferrer">${esc(item.title)}</a></h2>
          <p class="summary">${esc(trim(item.summary, 280) || "暂无摘要。")}</p>
          <p class="text">${esc(trim(item.text, 360))}</p>
          <div class="tags">
            <span class="tag">${esc(item.source)}</span>
            <span class="tag">${esc(item.category)}</span>
            <span class="tag ${esc(item.kind)}">${esc(item.kind)}</span>
            <span class="tag score">score ${esc(item.score)}</span>
            ${item.stars === null || item.stars === undefined ? "" : `<span class="tag github">${esc(item.stars)} stars</span>`}
          </div>
        </article>
      `).join("");
    }

    async function boot() {
      try {
        const response = await fetch("./data/news.json", { cache: "no-store" });
        const payload = await response.json();
        state.items = payload.items || [];
        updated.textContent = payload.generated_at ? `更新于 ${new Date(payload.generated_at).toLocaleString()}` : "已加载";
        renderStats(payload);
        renderCategories(state.items);
        renderFeed();
      } catch (error) {
        feed.innerHTML = `<div class="empty">还没有生成数据。运行 python scripts/collect.py 或等待 GitHub Actions 更新。</div>`;
      }
    }

    search.addEventListener("input", (event) => {
      state.query = event.target.value;
      renderFeed();
    });
    category.addEventListener("change", (event) => {
      state.category = event.target.value;
      renderFeed();
    });
    boot();
  </script>
</body>
</html>
